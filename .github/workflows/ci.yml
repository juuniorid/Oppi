name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: cd backend && pnpm install --frozen-lockfile
      - run: cd backend && pnpm run lint
      - run: cd backend && pnpm run build
      - run: cd backend && pnpm run test:all

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm run lint
      - run: cd frontend && pnpm run build

  backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: oppi_test
          POSTGRES_USER: oppi
          POSTGRES_PASSWORD: oppi
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: cd backend && pnpm install --frozen-lockfile
      - run: cd backend && pnpm run test:e2e
        env:
          TEST_DATABASE_URL: postgresql://oppi:oppi@localhost:5433/oppi_test
