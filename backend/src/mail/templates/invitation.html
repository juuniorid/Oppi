<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Oppi</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f7;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f7; padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="560"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
            "
          >
            <!-- Header -->
            <tr>
              <td
                style="
                  background-color: #4f46e5;
                  padding: 32px;
                  text-align: center;
                "
              >
                <h1 style="margin: 0; color: #ffffff; font-size: 28px">
                  Welcome to Oppi
                </h1>
              </td>
            </tr>
            <!-- Body -->
            <tr>
              <td style="padding: 32px">
                <p style="margin: 0 0 16px; font-size: 16px; color: #333333">
                  Hello,
                </p>
                <p style="margin: 0 0 16px; font-size: 16px; color: #333333">
                  You have been invited to join <strong>Oppi</strong> as a
                  <strong>{{role}}</strong>.
                </p>
                <p style="margin: 0 0 24px; font-size: 16px; color: #333333">
                  Click the button below to log in with your Google account and
                  get started:
                </p>
                <table
                  role="presentation"
                  cellpadding="0"
                  cellspacing="0"
                  style="margin: 0 auto"
                >
                  <tr>
                    <td
                      style="
                        background-color: #4f46e5;
                        border-radius: 6px;
                        text-align: center;
                      "
                    >
                      <a
                        href="{{loginUrl}}"
                        target="_blank"
                        style="
                          display: inline-block;
                          padding: 14px 32px;
                          color: #ffffff;
                          font-size: 16px;
                          font-weight: bold;
                          text-decoration: none;
                        "
                      >
                        Log In to Oppi
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin: 24px 0 0; font-size: 14px; color: #888888">
                  If you did not expect this invitation, you can safely ignore
                  this email.
                </p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td
                style="
                  padding: 20px 32px;
                  background-color: #f9fafb;
                  text-align: center;
                "
              >
                <p style="margin: 0; font-size: 12px; color: #aaaaaa">
                  &copy; 2026 Oppi. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
